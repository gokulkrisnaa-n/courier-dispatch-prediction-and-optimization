# Full local stack: Redpanda (Kafka API) + scoring API + producer + dispatcher.
#
# Prereq: train first so ./artifacts/model.joblib + reference_profile.json exist:
#     python -m dispatch.train --full
# Then:
#     docker compose up --build
#
# Flow: producer replays historic events -> Redpanda -> dispatcher consumes,
# snapshots state, and POSTs each snapshot to the API /score endpoint.

services:
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      target: serve
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 5s
      timeout: 5s
      retries: 20

  producer:
    build:
      context: .
      target: runner
    command: ["python", "-m", "dispatch.stream.producer"]
    depends_on:
      redpanda:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      DISPATCH_TOPIC: pickup_events
      REPLAY_NROWS: "120000"
      REPLAY_REGION: "0"
      REPLAY_COMPRESSION: "600"   # 600x: ~1 day of events in a couple minutes

  dispatcher:
    build:
      context: .
      target: runner
    command: ["python", "-m", "dispatch.stream.dispatcher"]
    depends_on:
      redpanda:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      # Not :ro — Docker needs to create the /app/artifacts/monitoring mountpoint
      # for the named volume below, which fails on a read-only bind mount. The app
      # itself never writes outside that named volume, so this stays effectively read-only.
      - ./artifacts:/app/artifacts              # model.joblib + reference_profile.json
      - monitoring_data:/app/artifacts/monitoring   # rw: writes ops_metrics.json/perf_log.jsonl
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      DISPATCH_TOPIC: pickup_events
      API_URL: http://api:8000
      TICK_EVERY_SEC: "300"
      MAX_IDLE_POLLS: "60"

  dashboard:
    build:
      context: .
      target: runner
    command: ["streamlit", "run", "src/dispatch/dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    depends_on:
      redpanda:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: redpanda:9092
      API_URL: http://api:8000
    volumes:
      # Not :ro, same reason as the dispatcher above (mountpoint creation for the
      # named volume below needs a writable parent).
      - ./artifacts:/app/artifacts      # model.joblib + reference_profile.json
      - ./data:/app/data:ro             # raw CSV for replay/drift panels
      - monitoring_data:/app/artifacts/monitoring:ro   # same volume the dispatcher writes to

volumes:
  # Named volume (not a host bind mount) for the dispatcher's live-written
  # monitoring files. Both ./artifacts and ./data live under ~/Documents,
  # which on this machine is iCloud Drive-synced — a host bind mount that's
  # rewritten on every tick races with iCloud's sync daemon, which resolves
  # the conflict by silently renaming the directory ("monitoring 2", "monitoring 3", ...).
  # Dispatcher and dashboard end up pointing at the same /app/artifacts/monitoring
  # path inside their containers, but a Docker-managed volume there sidesteps
  # the host filesystem entirely, so no sync conflict is possible.
  monitoring_data: